<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>jsDelivr Download Stats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Get the latest download stats from your npm package, GitHub release or any file hosted on jsDelivr.">
    <meta name="keywords" content="jsDelivr, download, stats, npm, GitHub, CDN">

    <link rel="icon" type="image/png" href="assets/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg">
    <link rel="shortcut icon" href="assets/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="assets/favicon/site.webmanifest">

    <script type="module" src="assets/stats.js"></script>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header>
      <h1><a title="jsDelivr Download Stats" href="/jsdelivr-download-stats/" class="logo"></a> jsDelivr Download Stats</h1>
      <a title="jsDelivr Download Stats Repository on GitHub" href="https://github.com/create3000/jsdelivr-download-stats" target="_blank" class="github"></a>
    </header>
    <main>
        <p>Data range: <select id="period">
          <option value="month">month</option>
          <option value="quarter" selected>quarter</option>
          <option value="year">year</option>
        </select>
      </p>
      <h2>Stats for Past <span id="period-title">Quarter</span></h2>
      <div id="stats"></div>
      <p id="hosts">
        <input type="checkbox" id="show-github" class="material-symbols-outlined" checked>
        <label for="show-github">GitHub</label>
        <input type="checkbox" class="material-symbols-outlined" id="show-npm" checked>
        <label for="show-npm">npm</label>
      </p>
    </main>
    <footer>
      <p>♥ Made with love by <a href="https://github.com/create3000/" target="_blank">CREATE3000</a>.</p>
    </footer>
  </body>
</html>
