<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>jsDelivr Download Stats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Get the latest download stats from your npm package, GitHub release or any file hosted on jsDelivr.">
    <meta name="keywords" content="jsDelivr, download, stats, npm, GitHub, CDN">
    <link rel="icon" href="assets/images/favicon.ico">
    <script type="module" src="assets/stats.js"></script>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header>
      <h1><a title="jsDelivr Download Stats Repository on GitHub" href="https://github.com/create3000/jsdelivr-download-stats" target="_blank"></a> jsDelivr Download Stats</h1>
    </header>
    <main>
      <h2>Stats for Past Quarter</h2>
      <x3d-canvas
          contentScale="auto"
          update="auto"
          xsrc="path/to/your/X3D/world.x3d"></x3d-canvas>
    </main>
    <footer>
      <p>♥ Made with love by <a href="https://github.com/create3000/" target="_blank">CREATE3000</a>.</p>
    </footer>
  </body>
</html>
